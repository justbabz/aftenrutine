<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="55%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <mask id="ring-mask">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="296" r="168" fill="white"/>
      <circle cx="256" cy="296" r="142" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Soft inner glow inside ring -->
  <circle cx="256" cy="296" r="142" fill="white" fill-opacity="0.18"/>

  <!-- White ring (donut via mask) -->
  <rect width="512" height="512" fill="white" mask="url(#ring-mask)"/>

  <!-- Family silhouettes inside the ring -->
  <g fill="#1B1B2E">
    <!-- Combined body blob so the family looks connected at the base -->
    <path d="
      M 156 396
      C 156 348 178 308 210 308
      C 235 308 252 326 252 326
      C 252 326 248 308 246 318
      C 232 318 220 332 220 348
      C 220 348 226 318 246 318
      C 246 318 256 318 256 318
      C 256 318 266 318 266 318
      C 286 318 292 348 292 348
      C 292 332 280 318 266 318
      C 264 308 260 326 260 326
      C 260 326 277 308 302 308
      C 334 308 356 348 356 396
      Z" fill-opacity="0"/>

    <!-- Adult A: head + body -->
    <circle cx="206" cy="262" r="26"/>
    <path d="M 156 396 C 156 340 178 304 206 304 C 234 304 256 340 256 396 Z"/>

    <!-- Adult B: head + body -->
    <circle cx="306" cy="262" r="26"/>
    <path d="M 256 396 C 256 340 278 304 306 304 C 334 304 356 340 356 396 Z"/>

    <!-- Child 1 (slightly in front, between adults) -->
    <circle cx="236" cy="306" r="18"/>
    <path d="M 210 396 C 210 358 222 336 236 336 C 250 336 262 358 262 396 Z"/>

    <!-- Child 2 -->
    <circle cx="276" cy="306" r="18"/>
    <path d="M 250 396 C 250 358 262 336 276 336 C 290 336 302 358 302 396 Z"/>
  </g>

  <!-- Checkmark badge (top-right of ring) -->
  <g>
    <circle cx="372" cy="168" r="72" fill="white"/>
    <circle cx="372" cy="168" r="60" fill="#16A34A"/>
    <path d="M 340 172 L 364 196 L 408 142"
          stroke="white" stroke-width="20"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
