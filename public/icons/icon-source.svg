<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="55%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Solid white circle, centered -->
  <circle cx="256" cy="256" r="180" fill="white"/>

  <!-- Family silhouettes -->
  <g fill="#1B1B2E">
    <!-- Adult A (left parent) -->
    <circle cx="186" cy="200" r="30"/>
    <path d="
      M 140 290
      C 140 256 160 236 186 236
      C 212 236 232 256 232 290
      L 242 388
      Q 242 396 234 396
      L 138 396
      Q 130 396 130 388
      Z"/>
    <!-- Adult A arm draped on child 1 -->
    <path d="M 220 296 Q 244 290 244 314 L 230 330 Q 224 312 214 308 Z"/>

    <!-- Adult B (right parent) -->
    <circle cx="326" cy="200" r="30"/>
    <path d="
      M 280 290
      C 280 256 300 236 326 236
      C 352 236 372 256 372 290
      L 374 388
      Q 374 396 366 396
      L 270 396
      Q 262 396 262 388
      Z"/>
    <!-- Adult B arm draped on child 2 -->
    <path d="M 292 296 Q 268 290 268 314 L 282 330 Q 288 312 298 308 Z"/>

    <!-- Child 1 (older, between adults) -->
    <circle cx="232" cy="270" r="22"/>
    <path d="
      M 204 326
      C 204 304 216 296 232 296
      C 248 296 260 304 260 326
      L 266 388
      Q 266 396 258 396
      L 206 396
      Q 198 396 198 388
      Z"/>

    <!-- Child 2 (smaller, between adults) -->
    <circle cx="280" cy="284" r="18"/>
    <path d="
      M 256 338
      C 256 320 266 312 280 312
      C 294 312 304 320 304 338
      L 308 388
      Q 308 396 300 396
      L 260 396
      Q 252 396 252 388
      Z"/>
  </g>

  <!-- Checkmark badge -->
  <g>
    <circle cx="372" cy="168" r="72" fill="white"/>
    <circle cx="372" cy="168" r="60" fill="#16A34A"/>
    <path d="M 340 172 L 364 196 L 408 142"
          stroke="white" stroke-width="20"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
