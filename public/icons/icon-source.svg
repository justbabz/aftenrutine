<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="55%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Two rotating arrow arcs around the center, suggesting day/night cycle -->
  <g fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top arc: from upper-right curving counterclockwise through top to upper-left, ending pointing at sun -->
    <path d="M 360 96 A 200 200 0 0 0 96 360"/>
    <!-- Arrowhead at lower-left end, pointing into the sun -->
    <path d="M 70 332 L 96 360 L 124 334"/>

    <!-- Bottom arc: from lower-left curving counterclockwise through bottom to lower-right, ending pointing at moon -->
    <path d="M 152 416 A 200 200 0 0 0 416 152"/>
    <!-- Arrowhead at upper-right end, pointing into the moon -->
    <path d="M 442 180 L 416 152 L 388 178"/>
  </g>

  <!-- Sun (bottom-left, in the path of the arrowhead) -->
  <g transform="translate(68, 412)">
    <!-- Rays -->
    <g stroke="#FBBF24" stroke-width="7" stroke-linecap="round">
      <line x1="0" y1="-44" x2="0" y2="-60"/>
      <line x1="31" y1="-31" x2="42" y2="-42"/>
      <line x1="44" y1="0" x2="60" y2="0"/>
      <line x1="31" y1="31" x2="42" y2="42"/>
      <line x1="-31" y1="-31" x2="-42" y2="-42"/>
      <line x1="-44" y1="0" x2="-60" y2="0"/>
      <line x1="-31" y1="31" x2="-42" y2="42"/>
    </g>
    <circle r="28" fill="#FCD34D"/>
  </g>

  <!-- Moon (top-right, in the path of the arrowhead) -->
  <g transform="translate(444, 68)">
    <path d="M -4 -36 a 36 36 0 1 0 0 72 a 28 28 0 1 1 0 -72 z" fill="#FEF3C7"/>
  </g>

  <!-- Central white circle with green checkmark -->
  <circle cx="256" cy="256" r="118" fill="white"/>
  <path d="M 198 258 L 240 300 L 320 218"
        stroke="#16A34A" stroke-width="34"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
